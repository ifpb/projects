name: CineLog
description:
  O CineLog é uma aplicação web feita para organizar todos os filmes que você quer assistir ou que já assistiu.
  Com ele, você pode adicionar novos títulos, editar informações, marcar como assistido e até remover filmes da sua lista.
  Tudo fica organizado e fácil de visualizar, ajudando você a não perder nenhum filme e a acompanhar o seu próprio histórico de cinema.
