name: Sistema de Comunicação (SisCom)
description:
  Sistema que tem como objetivo formalizar a comunicação dentro da Companhia Estadual Habitação Popular da Paraíba (CEHAP).
  Será utilizado por todos os trabalhadores que necessitam registrar eventos, solicitar serviços e comunicar-se diretamente com pessoas de outros setores.
