name: PDE - Portal de Defesa de Estágios
description:
  O Portal de Agendamento de Defesas de Estágio é o canal oficial dedicado
  a organizar o encerramento do seu ciclo de aprendizado prático. De forma
  ágil e centralizada, a plataforma permite que estudantes reservem horários
  para suas bancas, submetam relatórios e alinhem a comunicação com
  orientadores e coordenadores. Nosso objetivo é eliminar a burocracia
  desse processo final, garantindo que a transição entre a vivência
  acadêmica e a profissional ocorra com total transparência e eficiência.
