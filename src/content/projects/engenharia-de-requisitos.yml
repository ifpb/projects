name: 'Skill: Engenharia de Requisitos (Claude Code)'
description: >-
  Skill para o Claude Code (CLI da Anthropic) que carrega conhecimento
  canônico de Engenharia de Requisitos, Análise de Negócios e Ética
  Profissional em qualquer sessão. Construída a partir do material didático
  completo do curso ERS da Profa. Dra. Juliana Dantas Ribeiro Viana de
  Medeiros (IFPB Campus João Pessoa) e da bibliografia canônica da área
  (Sommerville 10e, Pressman 9e, Wiegers 3e, Cohn, Robertson, Hull, Falbo,
  BABOK v3, SBC 002/2024). Conteúdo bilíngue — en-CA por padrão + snapshot
  pt-BR completo preservado em translations/pt-BR/. Distribuído sob CC
  BY-SA 4.0.
