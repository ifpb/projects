name: Engenharia de Requisitos — corpus para IA
description: >
  Metodologia canônica de Engenharia de Requisitos, Análise de Negócios e Ética
  Profissional empacotada como skill/plugin do Claude Code e como servidor MCP —
  expondo a Claude Desktop, Cursor, Cline, Zed e agentes customizados ferramentas
  executáveis (validação de user stories, critérios de aceitação e EARS; geração
  de artefatos de backlog) e recursos de referência. Construída a partir do curso
  de Engenharia de Requisitos de Software da Profa. Dra. Juliana Dantas Ribeiro
  Viana de Medeiros (IFPB — Campus João Pessoa) e da bibliografia canônica da área
  (Sommerville, Pressman, Wiegers, BABOK v3, SBC 002/2024). Integra-se ao
  OpenProject (round-trip via REST API) e ao OpenSpec / GitHub Spec Kit
  (Spec-Driven Development). Bilíngue (en-CA por padrão + snapshot pt-BR completo).
  Licença CC BY-SA 4.0.
