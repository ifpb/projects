name: FiberNOC
description:
  O projeto tem como objetivo desenvolver um software de monitoramento de ONUs (Optical Network Units)
  em redes de fibra óptica, permitindo a coleta e visualização em tempo real de informações como nível de
  sinal, status de conexão e desempenho dos dispositivos. A solução visa oferecer uma plataforma
  centralizada para provedores de internet,
  facilitando o diagnóstico de falhas, a geração de alertas e a análise histórica dos dados, contribuindo para maior eficiência operacional e melhoria na qualidade do serviço prestado aos clientes.
